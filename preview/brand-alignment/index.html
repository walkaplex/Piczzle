<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex">
<base href="/Piczzle/">
<title>Piczzle Brand Preview</title>
<link rel="stylesheet" href="css/styles.css?v=20260516">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/walkaplex/Piczzle@codex/brand-alignment/css/brand-alignment.css?v=brand-icon-2">
</head>
<body>
<script>
(async()=>{
  const page=await fetch('index.html?v=brand-icon-2').then(r=>r.text());
  const doc=new DOMParser().parseFromString(page,'text/html');
  document.body.innerHTML=doc.body.innerHTML;
  document.querySelectorAll('script').forEach(s=>s.remove());
  const app=document.createElement('script');
  app.src='js/app.js?v=20260516-backstart';
  document.body.appendChild(app);
})();
</script>
</body>
</html>
